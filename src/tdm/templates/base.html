<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Telegram Data Manager{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand"><span class="dot"></span> Telegram Data Manager</div>
    <nav>
      <a href="/">Dashboard</a>
      <a href="/dialogs">Chats</a>
      <a href="/jobs">Jobs</a>
      <a href="/settings">Storage</a>
    </nav>
    <div id="auth-badge" class="auth-badge">…</div>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <script src="/static/js/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
