{% extends "base.html" %}
{% block title %}Jobs — Telegram Data Manager{% endblock %}
{% block content %}
<div class="card">
  <h1>Jobs</h1>
  <div id="job-list">Loading…</div>
</div>
{% endblock %}
{% block scripts %}
<script>
async function refresh() {
  const jobs = await api('/api/jobs');
  const el = document.getElementById('job-list');
  el.innerHTML = jobs.length ? jobs.map(renderJobRow).join('') : '<p class="muted">No jobs yet — go to Chats to start one.</p>';
}
refresh();
setInterval(refresh, 3000);
</script>
{% endblock %}
