# Run Telegram Data Manager from the published Docker Hub image.
# Usage:
#   cp .env.example .env   # fill in TELEGRAM_API_ID / TELEGRAM_API_HASH
#   docker compose up -d
services:
  telegramdatamanager:
    image: prateekrajgautam/telegramdatamanager:latest
    container_name: telegramdatamanager
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8000}:8000"
    environment:
      TELEGRAM_API_ID: "${TELEGRAM_API_ID}"
      TELEGRAM_API_HASH: "${TELEGRAM_API_HASH}"
      SECRET_KEY: "${SECRET_KEY:-change-me-in-production}"
      MAX_CONCURRENT_DOWNLOADS: "${MAX_CONCURRENT_DOWNLOADS:-1}"
      TZ: "${TZ:-UTC}"
    volumes:
      # Session DB, sqlite db, telegram session files (keep private, chmod 600)
      - ./data:/app/data
      # Local media/export destination. Point this at any local path or a
      # network share already mounted on the host (NFS/SMB/etc) to save
      # directly to it — no extra copy step needed.
      - ${DOWNLOAD_DIR:-./downloads}:/app/downloads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
